name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

# PR ごとのプレビューを gh-pages の pr-preview/pr-<番号>/ に公開し、
# PR にプレビュー URL をコメントする。PR がクローズされると自動で削除される。
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: github.event.action != 'closed'
        with:
          node-version: 20
          cache: npm

      - name: Install & build
        if: github.event.action != 'closed'
        run: |
          npm ci
          npm run build

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./dist
          umbrella-dir: pr-preview
